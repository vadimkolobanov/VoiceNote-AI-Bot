name: deploy

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'alembic/**'
      - 'requirements.txt'
      - 'dev_app.py'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.VPS_SSH_KEY }}
          known_hosts: unnecessary
          name: id_ed25519

      - name: Trust host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s <<'EOF'
          set -euo pipefail
          cd /opt/methodex
          git fetch --all
          git reset --hard origin/master
          ./.venv/bin/pip install -q --upgrade pip
          ./.venv/bin/pip install -q -r requirements.txt
          ./.venv/bin/python -m alembic upgrade head
          sudo /bin/systemctl restart methodex-api
          # Retry health-check 20 раз × 1 сек: даём сервису прогреться.
          for i in $(seq 1 20); do
            if curl -fsS -m 3 http://127.0.0.1:8765/health >/dev/null 2>&1; then
              echo "service is healthy after ${i}s"
              curl -fsS -m 3 http://127.0.0.1:8765/health
              exit 0
            fi
            sleep 1
          done
          echo "service did not become healthy in 20s"
          sudo /bin/systemctl status methodex-api --no-pager | head -25
          journalctl -u methodex-api -n 30 --no-pager
          exit 1
          EOF
