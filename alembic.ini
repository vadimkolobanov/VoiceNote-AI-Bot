; Alembic config — docs/PRODUCT_PLAN.md §11.2.
; URL читается из env.py (``sync_database_url()``), здесь — только форматы файлов.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
timezone = UTC

; Шаблон имён миграций: YYYY_MM_DD_<slug>_<rev>.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(slug)s_%%(rev)s

; URL пустой — env.py подтягивает его из src/core/config
sqlalchemy.url =


[post_write_hooks]
; пока не используем

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
